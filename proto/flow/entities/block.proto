// Minimal Flow Block entity for x402 gRPC-Web demo.
// Only includes fields displayed in the example output.
// See full spec: https://github.com/onflow/flow/blob/master/protobuf/flow/entities/block.proto

syntax = "proto3";

package flow.entities;

import "google/protobuf/timestamp.proto";

message Block {
  bytes id = 1;
  bytes parent_id = 2;
  uint64 height = 3;
  google.protobuf.Timestamp timestamp = 4;
}
